name: Build ESP32

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15/packages
            ~/.arduino15/cache
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-${{ hashFiles('**/*.ino') }}
          restore-keys: |
            ${{ runner.os }}-arduino-

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@2.0.17 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install LovyanGFX
          arduino-cli lib install "TJpg_Decoder"

      - name: Install esptool
        run: pip install esptool

      - name: Debug Board Info
        run: |
          arduino-cli board details -b esp32:esp32:esp32s3

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3:FlashSize=16M,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi \
            --build-property "build.extra_flags=-DBOARD_HAS_PSRAM" \
            --output-dir ./output camera_test/camera_test.ino

      - name: Merge Binaries
        run: |
          # The filenames in ./output usually follow a pattern.
          # We need to find the specific files generated by arduino-cli.
          # For ESP32-S3:
          # 0x0000: bootloader.bin
          # 0x8000: partitions.bin
          # 0xe000: boot_app0.bin
          # 0x10000: app.bin

          # Using wildcard to handle potential prefix/suffix added by arduino-cli
          BOOTLOADER=$(ls ./output/*.bootloader.bin)
          PARTITIONS=$(ls ./output/*.partitions.bin)
          BOOTAPP0=$(find ~/.arduino15/packages/esp32/hardware/esp32/2.0.17/tools/partitions/boot_app0.bin)
          APP=$(ls ./output/camera_test.ino.bin)

          esptool.py --chip esp32s3 merge_bin \
            -o ./output/merged-firmware.bin \
            --flash_mode dio \
            --flash_size 16MB \
            0x0000 $BOOTLOADER \
            0x8000 $PARTITIONS \
            0xe000 $BOOTAPP0 \
            0x10000 $APP

      - name: List Output Files
        run: ls -R ./output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-bin
          path: ./output/*.bin
