name: Build ESP32

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@2.0.17 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install LovyanGFX
          # esp32-camera is usually built-in, but just in case:
          arduino-cli lib install esp32-camera || true

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir ./output camera_test/camera_test.ino

      - name: List Output Files
        run: ls -R ./output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-bin
          path: ./output/*.bin
